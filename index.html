<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Asimovian&display=swap"
      rel="stylesheet"
    />

    <title>the-pogo-stick-pioneers</title>
  </head>
  <body>
    <!-- Site Header -->
    <header>
      <div class="progress" data-total="6" aria-label="Progress through rooms">
        <div
          class="progressTrack"
          role="progressbar"
          aria-valuemin="1"
          aria-valuemax="6"
          aria-valuenow="1"
          aria-describedby="progressText"
        >
          <span class="roomProgress current"></span>
          <span class="roomProgress roomFailed"></span>
          <span class="roomProgress roomCompleted"></span>
          <span class="roomProgress"></span>
          <span class="roomProgress"></span>
          <span class="roomProgress"></span>
        </div>
      </div>

      <div class="roomTimer">
        Room time: <span id="roomMinutesSpan">00</span>:<span
          id="roomSecondsSpan"
          >00</span
        >
      </div>

      <div class="totalTimer">
        Total time: <span id="totalMinutesSpan">00</span>:<span
          id="totalSecondsSpan"
          >00</span
        >
      </div>

      <!-- <div class="score">Score:<span id="scoreSpan">0</span></div> -->
      <!-- Buttons -->
      <div class="headerBtns">
        <!-- Elements -->
        <button id="itemListBtn" class="itemListBtn">

              fill="#ECF5F1"
            />
          </svg>
        </button>
        <!-- Sound-->
        <button id="toggleSoundBtn" class="toggleSoundBtn">
          <!-- Sound off -->
          <svg
            id="soundIconInactive"
            width="35"
            height="28"
            viewBox="0 0 39 32"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >

              d="M30.4738 19.6848L34.158 16.0006M34.158 16.0006L37.8422 12.3164M34.158 16.0006L30.4738 12.3164M34.158 16.0006L37.8422 19.6848"

            />

              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>
    </header>

    <main>
      <!-- Login page -->
      <section class="loginPage"></section>
      <!-- Welcome page with menu -->
      <section id="welcomePage" class="welcomePage">
        Welcome
        <div class="mainMenu">
          <button id="woodRoomBtn" class="woodRoomBtn">Wood</button>
          <button id="fireRoomBtn" class="fireRoomBtn">Fire</button>
          <button id="earthRoomBtn" class="earthRoomBtn">Earth</button>
          <button id="metalRoomBtn" class="metalRoomBtn">Metal</button>
          <button id="waterRoomBtn" class="waterRoomBtn">Water</button>
          <button id="finalRoomBtn" class="finalRoomBtn">Final</button>
        </div>
      </section>
      <!-- Wood Room -->
      <section id="room1Wood" class="room1Wood hidden">room 1</section>
      <!-- Fire Room -->
      <section id="room2Fire" class="room2Fire hidden">room 2</section>
      <!-- Earth Room -->
      <section id="room3Earth" class="room3Earth hidden">room 3</section>
      <!-- Metal Room -->
      <section id="room4Metal" class="room4Metal hidden">room 4</section>
      <!-- Water Room -->
      <section id="room5Water" class="room5Water hidden">room 5</section>
      <!-- Game Over Room -->
      <section id="finalRoom" class="finalRoom hidden">Game over</section>
    </main>

    <!-- About dialog -->
    <dialog id="storyDialog" class="modal" aria-labelledby="dialogTitle">
      <div class="modal__inner">
        <button
          type="button"
          class="modalClose"
          id="closeStory"
          aria-label="Close and go back to landningpage"
        >
          <svg
            width="27"
            height="27"
            viewBox="0 0 27 27"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M26.4 11.5333V14.8667L6.4 14.8667L15.5667 24.0333L13.2 26.4L0 13.2L13.2 -1.91371e-06L15.5667 2.36666L6.4 11.5333L26.4 11.5333Z"
              fill="#ECF5F1"
            />
          </svg>
        </button>

        <h2 id="dialogTitle" class="modalTitle">Temple of the Five</h2>

        <!-- Tabs -->
        <div class="tabs" data-tabs>
          <div class="tabsList" role="tablist" aria-label="About navigation">
            <button
              type="button"
              class="tabsTab currentTab"
              role="tab"
              id="tabStory"
              aria-selected="true"
              aria-controls="panelStory"
              tabindex="0"
            >
              Story
            </button>

            <button
              type="button"
              class="tabsTab"
              role="tab"
              id="tabFeatures"
              aria-selected="false"
              aria-controls="panelFeatures"
              tabindex="-1"
            >
              Features
            </button>

            <button
              type="button"
              class="tabsTab"
              role="tab"
              id="tabHowto"
              aria-selected="false"
              aria-controls="panelHowto"
              tabindex="-1"
            >
              How to
            </button>

            <button
              type="button"
              class="tabsTab"
              role="tab"
              id="tabDev"
              aria-selected="false"
              aria-controls="panelDev"
              tabindex="-1"
            >
              Dev
            </button>
          </div>

          <!-- Panels -->
          <section
            class="tabsPanel"
            role="tabpanel"
            id="panelStory"
            aria-labelledby="tabStory"
          >
            <p>Story</p>
          </section>

          <section
            class="tabsPanel"
            role="tabpanel"
            id="panelFeatures"
            aria-labelledby="tabFeatures"
            hidden
          >
            <p>Features</p>
          </section>

          <section
            class="tabsPanel"
            role="tabpanel"
            id="panelHowto"
            aria-labelledby="tabHowto"
            hidden
          >
            <p>How to</p>
          </section>

          <section
            class="tabsPanel"
            role="tabpanel"
            id="panelDev"
            aria-labelledby="tabDev"
            hidden
          >
            <p>Dev</p>
          </section>
        </div>
      </div>
    </dialog>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
